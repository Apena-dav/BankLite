<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dash Board</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div id="personaldets">
        <div id="welcome">
            <p id="text">Good day👋</p>
            <h3 id="name">David Adewale</h3>
        </div>
        <div id="profile">
            <img src="icons/profile.png" alt="profile">
        </div>
    </div>

    <div id="accountinfo">
        <div id="maininfo">
            <p class="label" id="tbal">Total Balance</p>
            <h2 class="label" id="price">$ 142,500.00</h2>
            <p class="label" id="accnum">**** **** 4821</p>
        </div>
    </div>

     <div id="actions">
            <div id="deposit" class="action">
                <img src="icons/deposit.png" class="actimg" alt="deposit">
                <p>Deposit</p>
            </div>
            <div id="withdraw" class="action">
                 <img src="icons/withdraw.png"  class="actimg"alt="withdraw">
                <p>Withdraw</p>
            </div>
            <div id="transfer" class="action">
                <img src="icons/transfer.png"  class="actimg"alt="transfer">
                <p>Transfer</p>
            </div>
            <div id="history" class="action">
                <img src="icons/history.png" class="actimg" alt="history">
                <p>History</p>
            </div>
        </div>
    
    <script src="script.js"></script>
</body>
</html>
