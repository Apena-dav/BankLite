<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link rel="stylesheet" href="signin.css">
</head>
<body>
    <div id="main">
        <p id="welcome">Welcome to</p>
        <h3>Banklite</h3>
        <h4>Login to your account</h4>
        <div id="signin">
            <input type="text"  id="username" class="dets" placeholder="Username"></input>
            <input type="password"  id="password" class="dets" placeholder="password"></input>
        </div>
        <p id="contract">By signing up for a Banklite account you agree our <u>Privacy policy</u> and <u>Terms of service</u></p>
        <div id="bottom">
            <button id="createBtn" onclick="signin()" >Login</button>
            <a href="createacc.html" id="question">Don't have an account?  </a>
        </div>
        <p id="warning1"></p>
        <p id="warning2"></p>
        <p id="warning3"></p>
        <p id="warning4"></p>
    </div>
    

    <script src="script.js"></script>
</body>
</html>
